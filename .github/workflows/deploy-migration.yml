name: Deploy bot migration to production

# This is deliberately manual. The normal deployment workflow refuses commits that add Alembic files.
on:
  workflow_dispatch:
    inputs:
      backup_and_restore_evidence:
        description: 'Exact phrase: BACKUP_RESTORE_VERIFIED'
        required: true
        type: string
      owner_go_no_go:
        description: 'Exact phrase: OWNER_APPROVED'
        required: true
        type: string
      release_card_reference:
        description: 'Private release-card / change record reference (no secrets)'
        required: true
        type: string

concurrency:
  group: teplo-bot-production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    uses: ./.github/workflows/lint.yml

  deploy-migration:
    needs: verify
    runs-on: ubuntu-latest
    environment: teplo-vpn-production-migration
    timeout-minutes: 20
    steps:
      - name: Validate the documented migration gates
        env:
          BACKUP_AND_RESTORE_EVIDENCE: ${{ inputs.backup_and_restore_evidence }}
          OWNER_GO_NO_GO: ${{ inputs.owner_go_no_go }}
          RELEASE_CARD_REFERENCE: ${{ inputs.release_card_reference }}
        run: |
          set -Eeuo pipefail
          test "$BACKUP_AND_RESTORE_EVIDENCE" = 'BACKUP_RESTORE_VERIFIED'
          test "$OWNER_GO_NO_GO" = 'OWNER_APPROVED'
          test -n "$RELEASE_CARD_REFERENCE"

      - name: Deploy the exact migration revision and wait for health
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -Eeuo pipefail

            readonly REPO_DIR='/opt/remnawave-bedolaga-telegram-bot'
            readonly SERVICE='bot'
            readonly TARGET_SHA='${{ github.sha }}'
            readonly MIN_FREE_KB=2097152
            readonly STATE_DIR='/var/lib/teplo-vpn/deploy-state'
            readonly STATE_FILE="$STATE_DIR/bot-production.state"
            BUILD_DIR=''
            BUILD_OVERRIDE=''

            cd "$REPO_DIR"

            compose() {
              if [ -n "$BUILD_OVERRIDE" ]; then
                docker compose -f docker-compose.yml -f "$BUILD_OVERRIDE" "$@"
              else
                docker compose -f docker-compose.yml "$@"
              fi
            }

            cleanup_build_context() {
              if [ -n "$BUILD_DIR" ]; then
                rm -rf "$BUILD_DIR"
              fi
            }

            create_clean_build_context() {
              BUILD_DIR="$(mktemp -d /tmp/teplo-vpn-bot-build.XXXXXX)"
              BUILD_OVERRIDE="$BUILD_DIR/compose-build-context.yml"
              git archive "$TARGET_SHA" | tar -x -C "$BUILD_DIR"
              printf '%s\n' \
                'services:' \
                '  bot:' \
                '    build:' \
                "      context: $BUILD_DIR" \
                '      dockerfile: Dockerfile' > "$BUILD_OVERRIDE"
            }

            verify_deployed_state() {
              test -r "$STATE_FILE"
              stored_sha="$(sed -n 's/^sha=//p' "$STATE_FILE")"
              stored_image="$(sed -n 's/^image=//p' "$STATE_FILE")"
              current_image="$(docker inspect --format '{{.Image}}' remnawave_bot)"
              test "$stored_sha" = "$TARGET_SHA"
              test "$stored_image" = "$current_image"
            }

            write_deployed_state() {
              install -d -m 700 "$STATE_DIR"
              state_tmp="$(mktemp "$STATE_DIR/bot-production.XXXXXX")"
              printf 'sha=%s\nimage=%s\n' "$TARGET_SHA" "$(docker inspect --format '{{.Image}}' remnawave_bot)" > "$state_tmp"
              chmod 600 "$state_tmp"
              mv "$state_tmp" "$STATE_FILE"
            }

            verify_migration_flags() {
              migration_flags="$(compose config 2>/dev/null | awk '/SKIP_MIGRATION:|ALLOW_MIGRATION_FAILURE:/ { print }')"
              if printf '%s\n' "$migration_flags" | grep -Eiq '(SKIP_MIGRATION|ALLOW_MIGRATION_FAILURE):.*(true|1)'; then
                echo 'Refusing migration deploy: target Compose config disables or tolerates migration failures.' >&2
                return 1
              fi
            }

            verify_migration_revision() {
              expected_revisions="$(compose exec -T "$SERVICE" /app/.venv/bin/alembic heads 2>/dev/null | awk '{ print $1 }' | sort | paste -sd, -)"
              actual_revisions="$(compose exec -T postgres sh -lc 'psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -Atc "SELECT version_num FROM alembic_version ORDER BY version_num"' | sort | paste -sd, -)"
              test -n "$expected_revisions"
              test "$expected_revisions" = "$actual_revisions"
            }

            trap cleanup_build_context EXIT

            if [ -n "$(git status --porcelain)" ]; then
              echo 'Refusing migration deploy: the server working tree is not an exact tracked source tree.' >&2
              exit 20
            fi

            if find . -maxdepth 1 -type f \( -name '*override*.yml' -o -name '*override*.yaml' \) -print -quit | grep -q .; then
              echo 'Refusing migration deploy: a Compose override file is present on the server.' >&2
              exit 21
            fi

            if [ "$(df -Pk . | awk 'NR == 2 { print $4 }')" -lt "$MIN_FREE_KB" ]; then
              echo 'Refusing migration deploy: less than 2 GiB of free disk space.' >&2
              exit 22
            fi

            git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
            readonly PREVIOUS_SHA="$(git rev-parse HEAD)"
            readonly REMOTE_MAIN_SHA="$(git rev-parse origin/main)"

            if [ "$TARGET_SHA" != "$REMOTE_MAIN_SHA" ]; then
              echo "Refusing migration deploy: workflow=$TARGET_SHA, origin/main=$REMOTE_MAIN_SHA." >&2
              exit 23
            fi

            git cat-file -e "${TARGET_SHA}^{commit}"

            if [ "$PREVIOUS_SHA" = "$TARGET_SHA" ]; then
              echo "Source already at $TARGET_SHA; requiring the container health gate again."
              verify_deployed_state
              verify_migration_flags
              compose up -d --no-build --wait --wait-timeout 240 "$SERVICE"
              compose ps "$SERVICE"
              verify_migration_revision
              exit 0
            fi

            if ! git merge-base --is-ancestor "$PREVIOUS_SHA" "$TARGET_SHA"; then
              echo "Refusing migration deploy: server commit $PREVIOUS_SHA is not an ancestor of $TARGET_SHA." >&2
              exit 24
            fi

            if git diff --quiet "$PREVIOUS_SHA" "$TARGET_SHA" -- migrations alembic.ini app/database main.py app/config.py; then
              echo 'Refusing migration workflow: no database or migration-risk change was found.' >&2
              exit 25
            fi

            if ! git diff --quiet "$PREVIOUS_SHA" "$TARGET_SHA" -- Dockerfile .dockerignore docker-compose.yml; then
              echo 'Refusing migration deploy: Docker or Compose changes require a separately approved combined release.' >&2
              exit 26
            fi

            git checkout --detach "$TARGET_SHA"
            if ! verify_migration_flags; then
              git checkout --detach "$PREVIOUS_SHA"
              exit 27
            fi

            create_clean_build_context
            compose build "$SERVICE"

            # No automatic rollback here: the migration may have changed the schema in a way
            # that makes the previous code unsafe. Recovery follows the approved release card.
            compose up -d --wait --wait-timeout 240 "$SERVICE"
            compose ps "$SERVICE"
            verify_migration_revision
            write_deployed_state
            echo "Container healthy and database revision verified for $TARGET_SHA at $(date --iso-8601=seconds)"
