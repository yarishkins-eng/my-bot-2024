name: Deploy bot to production

on:
  push:
    branches:
      - main
  workflow_dispatch:

# A deploy is executed against the exact commit that triggered this workflow.
# A newer push queues behind it; the older run then exits without changing the server.
concurrency:
  group: teplo-bot-production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    uses: ./.github/workflows/lint.yml

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy the exact non-migration revision and wait for health
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -Eeuo pipefail

            readonly REPO_DIR='/opt/remnawave-bedolaga-telegram-bot'
            readonly SERVICE='bot'
            readonly TARGET_SHA='${{ github.sha }}'
            readonly MIN_FREE_KB=2097152
            readonly STATE_DIR='/var/lib/teplo-vpn/deploy-state'
            readonly STATE_FILE="$STATE_DIR/bot-production.state"
            BUILD_DIR=''
            BUILD_OVERRIDE=''

            cd "$REPO_DIR"

            compose() {
              if [ -n "$BUILD_OVERRIDE" ]; then
                docker compose -f docker-compose.yml -f "$BUILD_OVERRIDE" "$@"
              else
                docker compose -f docker-compose.yml "$@"
              fi
            }

            cleanup_build_context() {
              if [ -n "$BUILD_DIR" ]; then
                rm -rf "$BUILD_DIR"
              fi
            }

            create_clean_build_context() {
              BUILD_DIR="$(mktemp -d /tmp/teplo-vpn-bot-build.XXXXXX)"
              BUILD_OVERRIDE="$BUILD_DIR/compose-build-context.yml"
              git archive "$TARGET_SHA" | tar -x -C "$BUILD_DIR"
              printf '%s\n' \
                'services:' \
                '  bot:' \
                '    build:' \
                "      context: $BUILD_DIR" \
                '      dockerfile: Dockerfile' > "$BUILD_OVERRIDE"
            }

            verify_deployed_state() {
              test -r "$STATE_FILE"
              stored_sha="$(sed -n 's/^sha=//p' "$STATE_FILE")"
              stored_image="$(sed -n 's/^image=//p' "$STATE_FILE")"
              current_image="$(docker inspect --format '{{.Image}}' remnawave_bot)"
              test "$stored_sha" = "$TARGET_SHA"
              test "$stored_image" = "$current_image"
            }

            write_deployed_state() {
              install -d -m 700 "$STATE_DIR"
              state_tmp="$(mktemp "$STATE_DIR/bot-production.XXXXXX")"
              printf 'sha=%s\nimage=%s\n' "$TARGET_SHA" "$(docker inspect --format '{{.Image}}' remnawave_bot)" > "$state_tmp"
              chmod 600 "$state_tmp"
              mv "$state_tmp" "$STATE_FILE"
            }

            trap cleanup_build_context EXIT

            # The image is built from this directory. Ignored runtime data (.env, data, uploads,
            # logs) stays outside the build context; every non-ignored file must be in Git.
            if [ -n "$(git status --porcelain)" ]; then
              echo 'Refusing deploy: the server working tree is not an exact tracked source tree.' >&2
              exit 10
            fi

            if find . -maxdepth 1 -type f \( -name '*override*.yml' -o -name '*override*.yaml' \) -print -quit | grep -q .; then
              echo 'Refusing deploy: a Compose override file is present on the server.' >&2
              exit 11
            fi

            if [ "$(df -Pk . | awk 'NR == 2 { print $4 }')" -lt "$MIN_FREE_KB" ]; then
              echo 'Refusing deploy: less than 2 GiB of free disk space for a safe build/rollback.' >&2
              exit 12
            fi

            git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
            readonly PREVIOUS_SHA="$(git rev-parse HEAD)"
            readonly REMOTE_MAIN_SHA="$(git rev-parse origin/main)"

            # Do not let a queued older workflow deploy over a newer main.
            if [ "$TARGET_SHA" != "$REMOTE_MAIN_SHA" ]; then
              echo "Skipping superseded deploy: workflow=$TARGET_SHA, origin/main=$REMOTE_MAIN_SHA"
              exit 0
            fi

            git cat-file -e "${TARGET_SHA}^{commit}"

            if [ "$PREVIOUS_SHA" = "$TARGET_SHA" ]; then
              echo "Source already at $TARGET_SHA; requiring the container health gate again."
              verify_deployed_state
              compose up -d --no-build --wait --wait-timeout 240 "$SERVICE"
              compose ps "$SERVICE"
              exit 0
            fi

            # A divergent history requires an explicit investigation, never an implicit checkout.
            if ! git merge-base --is-ancestor "$PREVIOUS_SHA" "$TARGET_SHA"; then
              echo "Refusing deploy: server commit $PREVIOUS_SHA is not an ancestor of $TARGET_SHA." >&2
              exit 13
            fi

            # main.py runs Alembic during normal startup. A new migration needs the dedicated,
            # manual migration workflow after backup + restore/upgrade evidence and owner approval.
            if ! git diff --quiet "$PREVIOUS_SHA" "$TARGET_SHA" -- migrations alembic.ini app/database main.py app/config.py; then
              echo 'Refusing automatic deploy: a database or migration-risk change is present.' >&2
              echo 'Use "Deploy bot migration to production" only after the documented migration gates.' >&2
              exit 14
            fi

            # Docker/Compose changes can change build inputs, dependencies, ports or volumes.
            if ! git diff --quiet "$PREVIOUS_SHA" "$TARGET_SHA" -- Dockerfile .dockerignore docker-compose.yml; then
              echo 'Refusing automatic deploy: a Docker or Compose change is present.' >&2
              echo 'Use "Deploy bot infrastructure to production" after the controlled-change gates.' >&2
              exit 15
            fi

            readonly PREVIOUS_IMAGE_ID="$(docker inspect --format '{{.Image}}' remnawave_bot)"
            readonly SERVICE_IMAGE="$(docker inspect --format '{{.Config.Image}}' remnawave_bot)"
            readonly ROLLBACK_IMAGE_TAG='teplo-vpn-rollback/bot:previous'
            docker image tag "$PREVIOUS_IMAGE_ID" "$ROLLBACK_IMAGE_TAG"

            SOURCE_SWITCHED=0
            SERVICE_SWITCH_ATTEMPTED=0
            rollback() {
              rc=$?
              trap - ERR
              set +e
              if [ "$SOURCE_SWITCHED" = '1' ]; then
                echo "Deploy failed; restoring the server source revision $PREVIOUS_SHA." >&2
                git checkout --detach "$PREVIOUS_SHA"
              fi
              if [ "$SERVICE_SWITCH_ATTEMPTED" = '1' ]; then
                echo 'The new container may have started; restoring the preserved working image.' >&2
                docker image tag "$ROLLBACK_IMAGE_TAG" "$SERVICE_IMAGE"
                compose up -d --no-build --wait --wait-timeout 240 "$SERVICE"
                compose ps "$SERVICE"
              fi
              exit "$rc"
            }
            trap rollback ERR

            git checkout --detach "$TARGET_SHA"
            SOURCE_SWITCHED=1
            create_clean_build_context
            compose build "$SERVICE"
            # --wait makes a green workflow mean that Docker confirmed the real HTTP healthcheck.
            SERVICE_SWITCH_ATTEMPTED=1
            compose up -d --wait --wait-timeout 240 "$SERVICE"
            compose ps "$SERVICE"
            write_deployed_state

            SOURCE_SWITCHED=0
            SERVICE_SWITCH_ATTEMPTED=0
            trap - ERR
            echo "Container healthy for $TARGET_SHA at $(date --iso-8601=seconds)"
