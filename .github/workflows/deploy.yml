name: Deploy to server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/remnawave-bedolaga-telegram-bot
            git pull origin main
            # Сначала собираем новый образ. Если сборка упадёт — set -e прервёт скрипт,
            # и СТАРЫЙ работающий контейнер останется нетронутым (бот не ляжет).
            docker compose build bot
            # Только после успешной сборки переключаемся на новую версию.
            docker compose up -d bot
            # Чистим устаревшие образы, чтобы не забивать диск.
            docker image prune -f || true
            echo "Deploy OK: $(git rev-parse --short HEAD) at $(date)"
